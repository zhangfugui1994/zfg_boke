<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品目录</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="site-header">
        <div class="header-top">
            <div class="container header-inner">
                <div class="header-left">
                    <a href="#" class="logo">
                        <span class="logo-text" data-editable="site_name">商品目录</span>
                    </a>
                    <nav class="main-nav">
                        <ul>
                            <li><a href="#" class="active"><i class="ri-home-heart-line"></i><span data-editable="nav_1">主页</span></a></li>
                            <li><a href="#"><i class="ri-star-line"></i><span data-editable="nav_2">防丢找回</span></a></li>
                        </ul>
                    </nav>
                </div>
                <div class="header-right">
                    <div class="search-box">
                        <input type="text" placeholder="搜索..." data-editable="search_placeholder">
                        <button><i class="ri-search-line"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="site-content">
        <div class="container">
            <!-- 轮播Banner -->
            <section class="banner-slider">
                <div class="slider-main">
                    <div class="slide active">
                        <a href="#" class="slide-link">
                            <img id="slide_img_1" src="https://placehold.co/600x300/4A90D9/FFFFFF?text=Slide+1" alt="Slide 1">
                            <div class="slide-info">
                                <h2 data-editable="slide_1_title">精选内容推荐</h2>
                                <div class="slide-meta">
                                    <img src="https://placehold.co/30" class="avatar" alt="">
                                    <span data-editable="slide_1_author">管理员</span>
                                    <span data-editable="slide_1_date">2024-01-01</span>
                                </div>
                            </div>
                        </a>
                    </div>
                    <div class="slide">
                        <a href="#" class="slide-link">
                            <img id="slide_img_2" src="https://placehold.co/600x300/E94B3C/FFFFFF?text=Slide+2" alt="Slide 2">
                            <div class="slide-info">
                                <h2 data-editable="slide_2_title">新手入门指南</h2>
                                <div class="slide-meta">
                                    <img src="https://placehold.co/30" class="avatar" alt="">
                                    <span data-editable="slide_2_author">管理员</span>
                                    <span data-editable="slide_2_date">2024-01-01</span>
                                </div>
                            </div>
                        </a>
                    </div>
                    <div class="slide">
                        <a href="#" class="slide-link">
                            <img id="slide_img_3" src="https://placehold.co/600x300/50B88D/FFFFFF?text=Slide+3" alt="Slide 3">
                            <div class="slide-info">
                                <h2 data-editable="slide_3_title">客服帮助中心</h2>
                                <div class="slide-meta">
                                    <img src="https://placehold.co/30" class="avatar" alt="">
                                    <span data-editable="slide_3_author">管理员</span>
                                    <span data-editable="slide_3_date">2024-01-01</span>
                                </div>
                            </div>
                        </a>
                    </div>
                </div>
                <div class="slider-nav">
                    <button class="slider-prev" onclick="changeSlide(-1)"><i class="ri-arrow-left-s-line"></i></button>
                    <button class="slider-next" onclick="changeSlide(1)"><i class="ri-arrow-right-s-line"></i></button>
                </div>
                <div class="slider-dots">
                    <span class="dot active" onclick="goToSlide(0)"></span>
                    <span class="dot" onclick="goToSlide(1)"></span>
                    <span class="dot" onclick="goToSlide(2)"></span>
                </div>
            </section>

            <!-- 广告位 -->
            <section class="ad-banner">
                <a href="#" class="ad-link">
                    <img id="ad_img" src="https://placehold.co/1200x120/7B68EE/FFFFFF?text=Advertisement" alt="Ad">
                </a>
            </section>

            <!-- 文章列表 -->
            <section class="posts-section">
                <div class="section-header">
                    <h2 class="section-title" data-editable="posts_title">最新文章</h2>
                    <a href="#" class="more-link" data-editable="more_link">查看更多 <i class="ri-arrow-right-s-line"></i></a>
                </div>
                <div class="posts-grid" id="postsGrid">
                </div>
            </section>
        </div>
    </main>

    <!-- 底部 -->
    <footer class="site-footer">
        <div class="container">
            <div class="footer-bottom">
                <div class="footer-left">
                    <div class="copyright">Copyright &copy; <span id="footerYear"></span> <a href="#"><span data-editable="footer_name">MySite</span></a></div>
                </div>
                <div class="footer-right">
                    <span data-editable="footer_info">加载完成</span>
                </div>
            </div>
        </div>
    </footer>

    <!-- 移动端底部导航（仅保留首页） -->
    <nav class="mobile-footer">
        <a href="#" class="mobile-nav-item active">
            <i class="ri-home-heart-line"></i>
            <span>首页</span>
        </a>
    </nav>

    <!-- ===== 编辑面板 ===== -->
    <div class="edit-overlay" id="editOverlay">
        <div class="edit-panel">
            <div class="edit-header">
                <h3><i class="ri-edit-line"></i> 编辑网站内容</h3>
                <button class="edit-close" onclick="hideEditPanel()">&times;</button>
            </div>
            <div class="edit-body">
                <!-- 站点信息 -->
                <details class="edit-group open" open>
                    <summary><i class="ri-global-line"></i> 站点信息</summary>
                    <div class="edit-group-content">
                        <div class="edit-field">
                            <label>网站名称</label>
                            <input type="text" id="edit_site_name" data-target="site_name" placeholder="商品目录">
                        </div>
                        <div class="edit-field">
                            <label>底部版权名称</label>
                            <input type="text" id="edit_footer_name" data-target="footer_name" placeholder="MySite">
                        </div>
                    </div>
                </details>

                <!-- 导航菜单 -->
                <details class="edit-group">
                    <summary><i class="ri-menu-line"></i> 导航菜单</summary>
                    <div class="edit-group-content">
                        <div class="edit-field">
                            <label>导航1</label>
                            <input type="text" id="edit_nav_1" data-target="nav_1" placeholder="主页">
                        </div>
                        <div class="edit-field">
                            <label>导航2</label>
                            <input type="text" id="edit_nav_2" data-target="nav_2" placeholder="防丢找回">
                        </div>
                    </div>
                </details>

                <!-- 轮播图 -->
                <details class="edit-group">
                    <summary><i class="ri-image-line"></i> 轮播图 (3张)</summary>
                    <div class="edit-group-content">
                        <div class="edit-field">
                            <label>图1 标题</label>
                            <input type="text" id="edit_slide_1_title" data-target="slide_1_title" placeholder="标题">
                        </div>
                        <div class="edit-field">
                            <label>图1 作者</label>
                            <input type="text" id="edit_slide_1_author" data-target="slide_1_author" placeholder="作者">
                        </div>
                        <div class="edit-field">
                            <label>图1 日期</label>
                            <input type="text" id="edit_slide_1_date" data-target="slide_1_date" placeholder="日期">
                        </div>
                        <div class="edit-field">
                            <label>图1 图片URL</label>
                            <input type="text" id="edit_slide_img_1" placeholder="粘贴图片链接">
                        </div>
                        <hr class="edit-divider">
                        <div class="edit-field">
                            <label>图2 标题</label>
                            <input type="text" id="edit_slide_2_title" data-target="slide_2_title" placeholder="标题">
                        </div>
                        <div class="edit-field">
                            <label>图2 作者</label>
                            <input type="text" id="edit_slide_2_author" data-target="slide_2_author" placeholder="作者">
                        </div>
                        <div class="edit-field">
                            <label>图2 日期</label>
                            <input type="text" id="edit_slide_2_date" data-target="slide_2_date" placeholder="日期">
                        </div>
                        <div class="edit-field">
                            <label>图2 图片URL</label>
                            <input type="text" id="edit_slide_img_2" placeholder="粘贴图片链接">
                        </div>
                        <hr class="edit-divider">
                        <div class="edit-field">
                            <label>图3 标题</label>
                            <input type="text" id="edit_slide_3_title" data-target="slide_3_title" placeholder="标题">
                        </div>
                        <div class="edit-field">
                            <label>图3 作者</label>
                            <input type="text" id="edit_slide_3_author" data-target="slide_3_author" placeholder="作者">
                        </div>
                        <div class="edit-field">
                            <label>图3 日期</label>
                            <input type="text" id="edit_slide_3_date" data-target="slide_3_date" placeholder="日期">
                        </div>
                        <div class="edit-field">
                            <label>图3 图片URL</label>
                            <input type="text" id="edit_slide_img_3" placeholder="粘贴图片链接">
                        </div>
                    </div>
                </details>

                <!-- 广告位 -->
                <details class="edit-group">
                    <summary><i class="ri-ad-line"></i> 广告位</summary>
                    <div class="edit-group-content">
                        <div class="edit-field">
                            <label>广告图片URL</label>
                            <input type="text" id="edit_ad_img" placeholder="粘贴图片链接">
                        </div>
                    </div>
                </details>

                <!-- 文章管理 -->
                <details class="edit-group open" open>
                    <summary><i class="ri-file-list-line"></i> 文章列表 <button class="add-post-btn" onclick="addPost()"><i class="ri-add-line"></i> 添加文章</button></summary>
                    <div class="edit-group-content">
                        <div id="postsEditList"></div>
                    </div>
                </details>

                <!-- 底部信息 -->
                <details class="edit-group">
                    <summary><i class="ri-footer-line"></i> 底部信息</summary>
                    <div class="edit-group-content">
                        <div class="edit-field">
                            <label>底部文字</label>
                            <input type="text" id="edit_footer_info" data-target="footer_info" placeholder="加载完成">
                        </div>
                    </div>
                </details>
            </div>
            <div class="edit-footer">
                <button class="btn btn-primary" onclick="saveAll()"><i class="ri-save-line"></i> 保存所有修改</button>
                <button class="btn btn-outline" onclick="resetAll()"><i class="ri-refresh-line"></i> 恢复默认</button>
                <button class="btn btn-danger" onclick="exportHTML()"><i class="ri-download-line"></i> 导出网站</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
