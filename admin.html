<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网站管理</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #4A90D9;
            --primary-dark: #357ABD;
            --danger: #e74c3c;
            --text: #333;
            --text-light: #666;
            --text-muted: #999;
            --bg: #f5f6fa;
            --white: #fff;
            --border: #e8e8e8;
            --sidebar-width: 200px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        /* ===== 管理布局 ===== */
        .admin-layout {
            display: flex;
            min-height: 100vh;
        }

        /* 侧边栏 */
        .admin-sidebar {
            width: var(--sidebar-width);
            background: var(--white);
            border-right: 1px solid var(--border);
            padding: 20px 0;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            overflow-y: auto;
        }

        .sidebar-logo {
            padding: 0 20px 20px;
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
            border-bottom: 1px solid var(--border);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            font-size: 14px;
            color: var(--text-light);
            text-decoration: none;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .sidebar-nav a:hover,
        .sidebar-nav a.active {
            background: rgba(74,144,217,0.06);
            color: var(--primary);
            border-left-color: var(--primary);
        }

        .sidebar-nav a i { font-size: 18px; width: 20px; text-align: center; }

        /* 主内容区 */
        .admin-main {
            flex: 1;
            margin-left: var(--sidebar-width);
            padding: 24px 32px;
        }

        .admin-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .admin-header h1 {
            font-size: 22px;
            font-weight: 700;
        }

        .admin-actions {
            display: flex;
            gap: 8px;
        }

        .admin-actions .btn {
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary { background: var(--primary); color: var(--white); }
        .btn-primary:hover { background: var(--primary-dark); }

        .btn-outline {
            background: var(--white);
            border: 1px solid var(--border);
            color: var(--text-light);
        }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); }

        .btn-danger { background: var(--danger); color: var(--white); }
        .btn-danger:hover { background: #c0392b; }

        /* 表单卡片 */
        .form-card {
            background: var(--white);
            border-radius: 10px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }

        .form-card h3 {
            font-size: 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text);
        }

        .form-card h3 i { color: var(--primary); }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 12px;
        }

        .form-row.single { grid-template-columns: 1fr; }
        .form-row.triple { grid-template-columns: 1fr 1fr 1fr; }

        .form-group { margin-bottom: 0; }
        .form-group:last-child { margin-bottom: 0; }

        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-light);
            margin-bottom: 6px;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(74,144,217,0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 60px;
            font-family: inherit;
        }

        .divider {
            border: none;
            border-top: 1px dashed var(--border);
            margin: 16px 0;
        }

        /* 文章列表 */
        .post-item {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            background: var(--bg);
        }

        .post-item-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .post-item-header .post-name {
            font-weight: 600;
            font-size: 14px;
            color: var(--text-light);
        }

        .post-item-header button {
            background: var(--danger);
            color: var(--white);
            border: none;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            cursor: pointer;
        }

        .add-post-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 14px;
            border: 2px dashed var(--border);
            border-radius: 8px;
            background: transparent;
            color: var(--text-muted);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }

        .add-post-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(74,144,217,0.03);
        }

        /* 预览图 */
        .img-preview {
            width: 100%;
            max-height: 120px;
            object-fit: contain;
            border-radius: 6px;
            margin-top: 8px;
            background: var(--bg);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .admin-sidebar { display: none; }
            .admin-main { margin-left: 0; padding: 16px; }
            .form-row { grid-template-columns: 1fr; }
            .form-row.triple { grid-template-columns: 1fr; }
        }

        /* ===== 批量上传模态框 ===== */
        .batch-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 5000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .batch-modal-overlay.show { display: flex; }

        .batch-modal {
            background: var(--white);
            border-radius: 12px;
            width: 600px;
            max-width: 90vw;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .batch-modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .batch-modal-header h3 {
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .batch-modal-header h3 i { color: var(--primary); }

        .batch-modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-muted);
            padding: 4px;
        }

        .batch-modal-body {
            padding: 24px;
            overflow-y: auto;
            flex: 1;
        }

        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 10px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 20px;
        }

        .drop-zone:hover,
        .drop-zone.drag-over {
            border-color: var(--primary);
            background: rgba(74,144,217,0.04);
        }

        .drop-zone i {
            font-size: 48px;
            color: var(--primary);
            margin-bottom: 12px;
        }

        .drop-zone p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .drop-zone .hint {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 8px;
        }

        .batch-preview { display: none; }
        .batch-preview.show { display: block; }

        .batch-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 8px;
            background: var(--bg);
        }

        .batch-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .batch-item-info {
            flex: 1;
            min-width: 0;
        }

        .batch-item-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .batch-item-link {
            font-size: 11px;
            color: var(--primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }

        .batch-item-status {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            white-space: nowrap;
        }

        .batch-item-status.error {
            background: #ffebee;
            color: #c62828;
        }

        .batch-item-status.success {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .batch-modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .batch-select-all {
            font-size: 13px;
            color: var(--primary);
            cursor: pointer;
            background: none;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .batch-select-all:hover {
            background: rgba(74,144,217,0.06);
        }

        .batch-count {
            font-size: 13px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <!-- 管理面板 -->
    <div class="admin-layout" id="adminLayout">
        <!-- 侧边栏 -->
        <aside class="admin-sidebar">
            <div class="sidebar-logo"><i class="ri-settings-3-line"></i> 网站管理</div>
            <nav class="sidebar-nav">
                <a href="#sec-site" class="active"><i class="ri-global-line"></i> 站点信息</a>
                <a href="#sec-nav"><i class="ri-menu-line"></i> 导航菜单</a>
                <a href="#sec-slide"><i class="ri-image-line"></i> 轮播图</a>
                <a href="#sec-ad"><i class="ri-ad-line"></i> 广告位</a>
                <a href="#sec-posts"><i class="ri-file-list-line"></i> 文章管理</a>
                <a href="#sec-footer"><i class="ri-layout-bottom-line"></i> 底部信息</a>
            </nav>
        </aside>

        <!-- 主内容 -->
        <main class="admin-main">
            <div class="admin-header">
                <h1><i class="ri-settings-3-line"></i> 编辑网站内容</h1>
                <div class="admin-actions">
                    <button class="btn btn-outline" onclick="resetAll()"><i class="ri-refresh-line"></i> 恢复默认</button>
                    <button class="btn btn-outline" onclick="downloadScriptJS()"><i class="ri-git-commit-line"></i> 生成 script.js</button>
                    <button class="btn btn-primary" onclick="pushToGitHub()"><i class="ri-upload-cloud-2-line"></i> <span id="pushBtnText">一键推送</span></button>
                    <button class="btn btn-danger" onclick="exportHTML()"><i class="ri-download-line"></i> 导出网站</button>
                    <button class="btn btn-primary" onclick="saveAll()"><i class="ri-save-line"></i> 保存</button>
                </div>
            </div>

            <!-- 站点信息 -->
            <div class="form-card" id="sec-site">
                <h3><i class="ri-global-line"></i> 站点信息</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>网站名称</label>
                        <input type="text" id="edit_site_name" data-target="site_name" placeholder="商品目录">
                    </div>
                    <div class="form-group">
                        <label>底部版权名称</label>
                        <input type="text" id="edit_footer_name" data-target="footer_name" placeholder="MySite">
                    </div>
                </div>
            </div>

            <!-- 导航菜单 -->
            <div class="form-card" id="sec-nav">
                <h3><i class="ri-menu-line"></i> 导航菜单</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>导航1</label>
                        <input type="text" id="edit_nav_1" data-target="nav_1" placeholder="主页">
                    </div>
                    <div class="form-group">
                        <label>导航2</label>
                        <input type="text" id="edit_nav_2" data-target="nav_2" placeholder="防丢找回">
                    </div>
                    <div class="form-group">
                        <label>导航3</label>
                        <input type="text" id="edit_nav_3" data-target="nav_3" placeholder="积分领取">
                    </div>
                </div>
            </div>

            <!-- 轮播图 -->
            <div class="form-card" id="sec-slide">
                <h3><i class="ri-image-line"></i> 轮播图 (3张)</h3>

                <div class="form-row triple">
                    <div class="form-group">
                        <label>图1 标题</label>

                <div class="form-row single">

                    </div>
                </div>
                <img class="img-preview" id="preview_slide_img_1" src="" alt="预览">

                <hr class="divider">

                <div class="form-row triple">
                    <div class="form-group">
                        <label>图2 标题</label>
                        <input type="text" id="edit_slide_2_title" data-target="slide_2_title" placeholder="标题">
                    </div>
                    <div class="form-group">
                        <label>图2 作者</label>
                        <input type="text" id="edit_slide_2_author" data-target="slide_2_author" placeholder="作者">

                        <label>图2 日期</label>
                        <input type="text" id="edit_slide_2_date" data-target="slide_2_date" placeholder="日期">

                <div class="form-row single">
                    <div class="form-group">
                        <label>图2 图片URL</label>
                        <input type="text" id="edit_slide_img_2" placeholder="粘贴图片链接">
                    </div>
                </div>
                <img class="img-preview" id="preview_slide_img_2" src="" alt="预览">

                <hr class="divider">

                <div class="form-row triple">
                    <div class="form-group">
                        <label>图3 标题</label>
                        <input type="text" id="edit_slide_3_title" data-target="slide_3_title" placeholder="标题">

                        <label>图3 日期</label>
                        <input type="text" id="edit_slide_3_date" data-target="slide_3_date" placeholder="日期">
                    </div>
                </div>
                <div class="form-row single">
                    <div class="form-group">
                        <label>图3 图片URL</label>
                        <input type="text" id="edit_slide_img_3" placeholder="粘贴图片链接">
                    </div>
                </div>
                <img class="img-preview" id="preview_slide_img_3" src="" alt="预览">
            </div>

            <!-- 广告位 -->
            <div class="form-card" id="sec-ad">
                <h3><i class="ri-ad-line"></i> 广告位</h3>
                <div class="form-row single">
                    <div class="form-group">
                        <label>广告图片URL</label>
                        <input type="text" id="edit_ad_img" placeholder="粘贴图片链接">

                </div>

            <div class="form-card" id="sec-posts">
                <h3><i class="ri-file-list-line"></i> 文章管理</h3>

                    <button class="add-post-btn" onclick="addPost()" style="width: auto; padding: 8px 16px; border: none;"><i class="ri-add-line"></i> 添加新文章</button>
                    <button class="add-post-btn" onclick="openBatchUpload()" style="width: auto; padding: 8px 16px; border: none;"><i class="ri-upload-cloud-2-line"></i> 批量上传 .md</button>
                </div>
                <div id="postsEditList"></div>
            </div>

            <!-- 底部信息 -->
            <div class="form-card" id="sec-footer">
                <h3><i class="ri-layout-bottom-line"></i> 底部信息</h3>
                <div class="form-row single">
                    <div class="form-group">
                        <label>底部文字</label>
                        <input type="text" id="edit_footer_info" data-target="footer_info" placeholder="加载完成">
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 批量上传模态框 -->
    <div class="batch-modal-overlay" id="batchModal">
        <div class="batch-modal">
            <div class="batch-modal-header">
                <h3><i class="ri-upload-cloud-2-line"></i> 批量上传 .md 文件</h3>
                <button class="batch-modal-close" onclick="closeBatchUpload()">&times;</button>
            </div>
            <div class="batch-modal-body">
                <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                    <i class="ri-upload-2-line"></i>
                    <p>拖拽 .md 文件到这里，或点击选择文件</p>
                    <p class="hint">支持多选，将从文件中提取标题和分享链接</p>
                    <input type="file" id="fileInput" accept=".md,.markdown,.txt" multiple style="display:none">
                </div>
                <div class="batch-preview" id="batchPreview">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                        <span style="font-size: 14px; font-weight: 600;">解析结果</span>
                        <span class="batch-count" id="batchCount"></span>
                    </div>
                    <div id="batchItemList"></div>
                </div>
            </div>
            <div class="batch-modal-footer">
                <button class="batch-select-all" onclick="toggleSelectAll()">全选/全不选</button>
                <button class="btn btn-primary" onclick="confirmBatchImport()" id="importBtn" disabled><i class="ri-check-line"></i> 确认导入</button>
            </div>
        </div>
    </div>

    let batchParsedItems = [];

    function handleFiles(files) {
        batchParsedItems = [];
        let loaded = 0;
        const totalFiles = Array.from(files).filter(f => f.name.match(/\.(md|markdown|txt)$/i)).length;

        if (totalFiles === 0) {
            alert('请选择 .md 文件');
            return;
        }

        Array.from(files).forEach(file => {
            if (!file.name.match(/\.(md|markdown|txt)$/i)) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                const content = e.target.result;
                const parsed = parseMarkdown(content);
                batchParsedItems.push({
                    filename: file.name,
                    ...parsed
                });
                loaded++;
                if (loaded === totalFiles) {
                    renderBatchPreview();
                }
            };
            reader.readAsText(file, 'UTF-8');
        });
    }

    function parseMarkdown(content) {
        const lines = content.split('\n').map(l => l.trim()).filter(l => l);

        // 提取标题：优先取 front matter 中的 title: 字段，其次取正文中的 # 标题行
        let title = '';

        // 1. 尝试从 front matter 中提取 title: xxx
        const fmMatch = content.match(/^title:\s*(.+)$/m);
        if (fmMatch && fmMatch[1].trim()) {
            title = fmMatch[1].trim();
        }

        // 2. 如果没有 front matter title，取 --- 分隔后的第一个 # 标题
        if (!title) {
            const fmEnd = content.indexOf('---', 3);
            const body = fmEnd !== -1 ? content.slice(fmEnd + 3) : content;
            const bodyLines = body.split('\n').map(l => l.trim()).filter(l => l);
            for (const line of bodyLines) {
                if (line.startsWith('#')) {
                    title = line.replace(/^#+\s*/, '').trim();
                    break;
                }
            }
        }

        // 3. 兜底：取正文中第一个非 --- 行（不在 front matter 内）
        if (!title) {
            const fmEnd = content.indexOf('---', 3);
            const body = fmEnd !== -1 ? content.slice(fmEnd + 3) : content;
            const bodyLines = body.split('\n').map(l => l.trim()).filter(l => l);
            if (bodyLines.length > 0) {
                title = bodyLines[0].replace(/^#+\s*/, '').trim();
            }
        }

        // 提取 size：优先 front matter 中的 size:，其次正文中的 全xxxG
        let size = '';
        const fmSizeMatch = content.match(/^size:\s*(.+)$/m);
        if (fmSizeMatch && fmSizeMatch[1].trim()) {
            size = fmSizeMatch[1].trim();
        } else {
            const bodySizeMatch = content.match(/全([0-9.]+\s*[KMGTPB]+)/i);
            if (bodySizeMatch) {
                size = '全' + bodySizeMatch[1].trim();
            }
        }

        // 提取分享链接：查找第一个非图片 URL
        const urlPattern = /https?:\/\/[^\s<>"')]+/g;
        const links = content.match(urlPattern);
        let shareLink = '';
        if (links) {
            for (const link of links) {
                if (!/\.(jpg|jpeg|png|gif|webp|svg|bmp|ico|tiff)/i.test(link)) {
                    shareLink = link;
                    break;
                }
            }
        }

        return { title, shareLink, size };
    }

    function renderBatchPreview() {
        const preview = document.getElementById('batchPreview');
        const itemList = document.getElementById('batchItemList');
        const count = document.getElementById('batchCount');
        const importBtn = document.getElementById('importBtn');

        preview.classList.add('show');

        if (batchParsedItems.length === 0) {
            itemList.innerHTML = '<p style="color:#999;text-align:center;padding:20px;">未解析到有效内容</p>';
            count.textContent = '0 篇';
            importBtn.disabled = true;
            return;
        }

        count.textContent = `${batchParsedItems.length} 篇`;
        importBtn.disabled = false;

        itemList.innerHTML = batchParsedItems.map((item, i) => {
            const hasError = !item.title && !item.shareLink;
            const statusClass = hasError ? 'error' : 'success';
            const statusText = hasError ? '解析失败' : '已提取';
            const linkDisplay = item.shareLink || '未找到链接';

            return `
                <div class="batch-item">
                    <input type="checkbox" checked id="batch_${i}">
                    <div class="batch-item-info">
                        <div class="batch-item-title">${escapeHtml(item.title || '(无标题')}]</div>
                        <div class="batch-item-link">${escapeHtml(linkDisplay)}</div>
                    </div>
                    <span class="batch-item-status ${statusClass}">${statusText}</span>
                </div>
            `;
        }).join('');
    }

    // ===== 一键推送到 GitHub =====
    function pushToGitHub() {
        var token = localStorage.getItem('github_token');
        if (!token) {
            // 创建临时输入框
            var overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99999;display:flex;align-items:center;justify-content:center';
            var box = document.createElement('div');
            box.style.cssText = 'background:#fff;border-radius:12px;padding:24px;width:400px;max-width:90vw';
            box.innerHTML = '<h3 style="margin:0 0 12px;font-size:16px">首次使用需要输入 Token</h3>' +
                '<p style="font-size:12px;color:#999;margin:0 0 12px">Token 仅保存在你的浏览器中，不会上传到任何服务器。</p>' +
                '<input type="text" id="gh_token_input" placeholder="ghp_..." style="width:100%;padding:8px;border:1px solid #e8e8e8;border-radius:6px;font-size:14px;box-sizing:border-box">' +
                '<div style="display:flex;gap:8px;margin-top:12px;justify-content:flex-end">' +
                '<button id="gh_cancel" style="padding:6px 16px;border:1px solid #e8e8e8;border-radius:6px;cursor:pointer">取消</button>' +
                '<button id="gh_confirm" style="padding:6px 16px;background:#4A90D9;color:#fff;border:none;border-radius:6px;cursor:pointer">确认</button>' +
                '</div>';
            overlay.appendChild(box);
            document.body.appendChild(overlay);

            return new Promise(function(resolve) {
                var input = document.getElementById('gh_token_input');
                input.focus();
                document.getElementById('gh_cancel').onclick = function() {
                    document.body.removeChild(overlay);
                    resolve(false);
                };
                document.getElementById('gh_confirm').onclick = function() {
                    var t = input.value.trim();
                    if (t) {
                        localStorage.setItem('github_token', t);
                        token = t;
                    }
                    document.body.removeChild(overlay);
                    resolve(t ? true : false);
                };
                input.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') {
                        document.getElementById('gh_confirm').click();
                    }
                });
            }).then(function(ok) {
                if (!ok) return;
            });
        }

        var btnText = document.getElementById('pushBtnText');
        btnText.textContent = '推送中...';
        btnText.parentElement.disabled = true;

        var articles = posts.map(function(p) {
            return {
                title: p.title,
                subtitle: p.subtitle,
                size: p.size,
                cover_image: p.cover_image,
                share_link: p.share_link,
                name: p.name,
                updated: p.updated
            };
        });

        var scriptContent = '// 商品数据（由管理面板自动生成）\n' +
            'const productsData = ' + JSON.stringify(articles, null, 2) + ';\n' +
            'let posts = JSON.parse(JSON.stringify(productsData));\n';

        // 先获取 script.js 的 SHA
        fetch('https://api.github.com/repos/zhangfugui1994/zfg_boke/contents/script.js', {
            headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github.v3+json' }
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            var sha = data.sha || null;

            // 创建/更新文件
            return fetch('https://api.github.com/repos/zhangfugui1994/zfg_boke/contents/script.js', {
                method: 'PUT',
                headers: {
                    'Authorization': 'Bearer ' + token,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: 'update: 从管理面板推送',
                    content: btoa(unescape(encodeURIComponent(scriptContent))),
                    ...(sha ? { sha: sha } : {})
                })
            });
        })
        .then(function(res) { return res.json(); })
        .then(function(data) {
            if (data.content || data.commit) {
                alert('推送成功！\nCloudflare Pages 将在 1-3 分钟内自动部署完成。');
            } else {
                alert('推送失败：' + (data.message || JSON.stringify(data)));
            }
        })
        .catch(function(err) {
            alert('推送出错：' + err.message);
        })
        .finally(function() {
            btnText.textContent = '一键推送';
            btnText.parentElement.disabled = false;
        });
    }

    // ===== 侧边栏导航高亮 =====
    function initSidebarNav() {
        const links = document.querySelectorAll('.sidebar-nav a');
        links.forEach(link => {
            link.addEventListener('click', function (e) {
                e.preventDefault();
                links.forEach(l => l.classList.remove('active'));
                this.classList.add('active');
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            });
        });

        // 滚动时自动高亮
        const cards = document.querySelectorAll('.form-card');
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const id = entry.target.id;
                    links.forEach(l => {
                        l.classList.toggle('active', l.getAttribute('href') === '#' + id);
                    });
                }
            });
        }, { rootMargin: '-80px 0px -60% 0px' });

        cards.forEach(card => observer.observe(card));
    }

    function initAdmin() {
        renderPostsEditList();
        loadSavedEdits();
        bindImagePreviews();
        initSidebarNav();
